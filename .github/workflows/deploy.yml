name: Deploy to GitHub Pages

on:
  push:
    branches: [master, redesign-nextjs, main]
  workflow_dispatch:
  # Rebuild so Medium book-note sync runs without a code push (static site pulls RSS at build).
  schedule:
    - cron: "0 6,18 * * *"

# Push orphan branch gh-pages (needs write). Ensure repo Settings → Actions → General → Workflow
# permissions allows “Read and write permissions” for GITHUB_TOKEN.
permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      # Optional: vars.PHOTOS_CDN_BASE → image URLs point at CDN. After changing/deleting files under
      # public/photos/, re-upload that tree to the CDN and purge cache, or the site can still show old photos.
      - run: pnpm build
        env:
          NEXT_PUBLIC_PHOTOS_CDN: ${{ vars.PHOTOS_CDN_BASE }}

      # Static Next export (includes .nojekyll). Serves correctly when Pages uses branch gh-pages / (root),
      # instead of Jekyll on the default branch README.
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          force_orphan: true
