name: Deploy to GitHub Pages

on:
  push:
    branches: [master, redesign-nextjs, main]
  workflow_dispatch:
  # Rebuild so Medium book-note sync runs without a code push (static site pulls RSS at build).
  schedule:
    - cron: "0 6,18 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      # Optional: vars.PHOTOS_CDN_BASE → image URLs point at CDN. After changing/deleting files under
      # public/photos/, re-upload that tree to the CDN and purge cache, or the site can still show old photos.
      - run: pnpm build
        env:
          NEXT_PUBLIC_PHOTOS_CDN: ${{ vars.PHOTOS_CDN_BASE }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
